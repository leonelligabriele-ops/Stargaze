# Netlify config — builds the Vite frontend and proxies the API to Render.
# Proxy target is the live Render service (update it if you rename the service).

[build]
  base    = "stargaze/frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the Render backend (server-side → no CORS needed).
# MUST come before the SPA catch-all below.
[[redirects]]
  from   = "/api/*"
  to     = "https://stargaze-api.onrender.com/:splat"
  status = 200
  force  = true

# SPA fallback so BrowserRouter deep links (/film/123, /explore?q=…) resolve.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
